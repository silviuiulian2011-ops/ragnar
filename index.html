<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ragnar Czr</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}

html,body{
  width:100%;
  min-height:100%;
  background:#050505;
  color:white;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.08),rgba(0,0,0,.42)),
    url("main-bg.png?v=4");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle,rgba(168,85,247,.12),rgba(0,0,0,.25));
  z-index:-1;
}

.page{
  min-height:100svh;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  padding:30px 16px 35px;
}

.card{
  width:100%;
  max-width:430px;
  padding:34px 30px 26px;
  border-radius:32px;
  text-align:center;
  background:rgba(0,0,0,.13);
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 0 35px rgba(168,85,247,.22);
}

.logo{
  width:100px;
  height:100px;
  margin:0 auto 18px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid #8b2cff;
  box-shadow:0 0 35px rgba(168,85,247,1);
  background:#111;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

h1{
  font-size:42px;
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:10px;
  text-shadow:0 0 18px rgba(168,85,247,.75);
}

.subtitle{
  color:#c084fc;
  font-size:18px;
  margin-bottom:14px;
}

.desc{
  color:#f1f1f1;
  font-size:17px;
  margin-bottom:24px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:16px;
  margin:13px 0;
  border-radius:18px;
  text-decoration:none;
  color:white;
  font-size:20px;
  font-weight:bold;
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.09);
  box-shadow:0 0 18px rgba(168,85,247,.16);
}

.footer{
  margin-top:20px;
  color:#ddd;
  font-size:14px;
}

@media(max-width:900px){
  body::before{
    background:
      linear-gradient(rgba(0,0,0,.05),rgba(0,0,0,.75)),
      url("main-bg.png?v=4");
    background-size:100% auto;
    background-position:top center;
    background-repeat:no-repeat;
  }

  .page{
    min-height:100svh;
    align-items:flex-end;
    padding:260px 14px 22px;
  }

  .card{
    max-width:360px;
    padding:24px 20px;
    background:rgba(0,0,0,.18);
  }

  .logo{
    width:82px;
    height:82px;
  }

  h1{
    font-size:31px;
  }

  .subtitle{
    font-size:14px;
  }

  .desc{
    font-size:15px;
  }

  .btn{
    font-size:17px;
    padding:14px;
  }
}
</style>
</head>

<body>

<main class="page">
  <section class="card">

    <div class="logo">
      <img src="main-bg.png?v=4" alt="Ragnar Czr">
    </div>

    <h1>RAGNAR</h1>

    <div class="subtitle">Syndicate • B-Zone • Los Santos</div>

    <div class="desc">Sindicatul conduce jocul. Restul doar participă.</div>

    <a class="btn" href="#" target="_blank">🎮 Discord</a>
    <a class="btn" href="#" target="_blank">🎵 TikTok</a>
    <a class="btn" href="#" target="_blank">▶️ YouTube</a>
    <a class="btn" href="#" target="_blank">❤️ Donații</a>

    <div class="footer">powered by Ragnar Czr ⚡</div>

  </section>
</main>

</body>
</html>
