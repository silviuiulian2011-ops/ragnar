<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ragnar Czr</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:#0a0a0a;
      color:white;
    }

    .bg{
      position:absolute;
      width:200%;
      height:200%;
      background:
      radial-gradient(circle at center, #7b2ff7 0%, transparent 25%),
      radial-gradient(circle at top left, #00c6ff 0%, transparent 20%),
      radial-gradient(circle at bottom right, #ff00aa 0%, transparent 20%);
      animation:moveBg 15s linear infinite;
      filter:blur(80px);
      opacity:0.7;
    }

    @keyframes moveBg{
      0%{transform:translate(0,0);}
      50%{transform:translate(-10%,-10%);}
      100%{transform:translate(0,0);}
    }

    .card{
      position:relative;
      z-index:2;
      width:380px;
      padding:40px;
      border-radius:30px;
      backdrop-filter:blur(20px);
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      text-align:center;
      box-shadow:0 0 40px rgba(123,47,247,0.4);
    }

    .avatar{
      width:120px;
      height:120px;
      margin:auto;
      border-radius:50%;
      border:4px solid #a855f7;
      overflow:hidden;
      box-shadow:0 0 25px #a855f7;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    h1{
      margin-top:20px;
      font-size:32px;
      letter-spacing:2px;
    }

    p{
      margin-top:10px;
      color:#ccc;
      margin-bottom:30px;
    }

    .btn{
      display:block;
      text-decoration:none;
      color:white;
      margin:15px 0;
      padding:16px;
      border-radius:16px;
      font-size:18px;
      transition:0.3s;
      font-weight:bold;
      background:linear-gradient(45deg,#7b2ff7,#f107a3);
      box-shadow:0 0 20px rgba(241,7,163,0.4);
    }

    .btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 30px rgba(241,7,163,0.8);
    }

    .footer{
      margin-top:25px;
      font-size:13px;
      color:#888;
    }
  </style>
</head>
<body>

  <div class="bg"></div>
<div class="banner">
  <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1600&auto=format&fit=crop">
</div>
  <div class="card">

    <div class="avatar">
      <img src="https://i.imgur.com/8Km9tLL.png">
    </div>

    <h1>RagnarCzr</h1>

    <p>Bine ai venit 👑</p>

    <a class="btn" href="https://discord.gg/LINKUL-TAU" target="_blank">
      Discord
    </a>

    <a class="btn" href="https://www.tiktok.com/" target="_blank">
      TikTok
    </a>

    <a class="btn" href="https://youtube.com/" target="_blank">
      YouTube
    </a>

    <a class="btn" href="https://paypal.me/" target="_blank">
      Donații
    </a>

    <div class="footer">
      powered by Silviu ⚡
    </div>

  </div>

</body>
</html>
