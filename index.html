<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ragnar Czr / Strugurel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#050505;color:white;overflow-x:hidden}

.choice-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;gap:30px;padding:30px;
  background:linear-gradient(135deg,#050505,#1b0030)
}
.choice{
  width:430px;height:560px;border-radius:30px;overflow:hidden;cursor:pointer;position:relative;
  border:2px solid rgba(168,85,247,.5);box-shadow:0 0 45px rgba(168,85,247,.55);transition:.3s
}
.choice:hover{transform:scale(1.035)}
.choice img{width:100%;height:100%;object-fit:cover;filter:brightness(.75)}
.choice-text{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:end;align-items:center;text-align:center;padding:40px;background:linear-gradient(transparent,rgba(0,0,0,.9))}
.choice-text h1{font-size:42px;text-transform:uppercase;text-shadow:0 0 20px #a855f7}

.site{
  display:none;min-height:100vh;
  background-size:cover;background-position:center;background-attachment:fixed;
  padding:22px;
}

.overlay{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:rgba(0,0,0,.18);
}

.banner{
  width:100%;
  max-width:1500px;
  height:340px;
  border-radius:36px;
  overflow:hidden;
  border:2px solid rgba(160,50,255,.8);
  box-shadow:0 0 35px rgba(139,44,255,.9);
  position:relative;
  z-index:2;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#050505;
}

.card{
  width:100%;
  max-width:460px;
  margin-top:55px;
  padding:38px 34px 28px;
  border-radius:32px;
  text-align:center;
  background:rgba(6,6,12,.88);
  border:1px solid rgba(168,85,247,.45);
  box-shadow:0 0 45px rgba(168,85,247,.75);
  position:relative;
  z-index:3;
}

.avatar{
  width:125px;height:125px;border-radius:50%;overflow:hidden;
  margin:-105px auto 22px;
  border:4px solid #8b2cff;
  box-shadow:0 0 35px rgba(168,85,247,1);
  background:#111;
}
.avatar img{width:100%;height:100%;object-fit:cover}

.card h2{font-size:42px;letter-spacing:4px;text-transform:uppercase;margin-bottom:12px}
.subtitle{color:#c084fc;font-size:17px;margin-bottom:14px;letter-spacing:1px}
.desc{color:#eee;font-size:17px;margin-bottom:24px}

.btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:17px;margin:14px 0;border-radius:17px;
  text-decoration:none;color:white;font-size:19px;font-weight:bold;
  background:linear-gradient(135deg,#8b2cff,#ff00b7);
  box-shadow:0 0 28px rgba(255,0,183,.55);
  transition:.25s;
}
.btn:hover{transform:scale(1.035)}

.switch{
  margin-top:14px;background:transparent;border:1px solid rgba(255,255,255,.25);
  color:white;padding:11px 17px;border-radius:14px;cursor:pointer
}
.footer{margin-top:20px;color:#bbb;font-size:14px}

@media(max-width:900px){
  .choice-screen{flex-direction:column}
  .choice{width:100%;max-width:360px;height:300px}
  .site{padding:12px}
  .banner{height:190px;border-radius:24px}
  .card{max-width:370px;margin-top:55px;padding:30px 22px}
  .avatar{width:105px;height:105px;margin-top:-85px}
  .card h2{font-size:32px}
  .subtitle{font-size:14px}
  .desc{font-size:15px}
  .btn{font-size:17px;padding:15px}
}
</style>
</head>

<body>

<section class="choice-screen" id="choiceScreen">
  <div class="choice" onclick="loadTheme('ragnar')">
    <img src="ragnar-banner.png">
    <div class="choice-text">
      <h1>Ragnar</h1>
      <p>Syndicate • B-Zone</p>
    </div>
  </div>

  <div class="choice" onclick="loadTheme('strugurel')">
    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop">
    <div class="choice-text">
      <h1>Strugurel</h1>
      <p>TikTok • Mafia Style</p>
    </div>
  </div>
</section>

<main class="site" id="site">
  <div class="overlay">

    <section class="banner">
      <img id="bannerImg">
    </section>

    <section class="card">
      <div class="avatar">
        <img id="avatarImg">
      </div>

      <h2 id="cardTitle"></h2>
      <div class="subtitle" id="subtitle"></div>
      <div class="desc" id="description"></div>

      <a class="btn" href="#" target="_blank">🎮 Discord</a>
      <a class="btn" href="#" target="_blank">🎵 TikTok</a>
      <a class="btn" href="#" target="_blank">▶️ YouTube</a>
      <a class="btn" href="#" target="_blank">❤️ Donații</a>

      <button class="switch" onclick="backToChoice()">Schimbă tema</button>

      <div class="footer" id="footer"></div>
    </section>

  </div>
</main>

<script>
const themes = {
  ragnar:{
    background:"linear-gradient(rgba(0,0,0,.18),rgba(0,0,0,.35)), url('ragnar-bg.png')",
    banner:"ragnar-banner.png",
    avatar:"ragnar-banner.png",
    title:"RAGNAR",
    subtitle:"Syndicate • B-Zone • Los Santos",
    description:"Sindicatul conduce jocul. Restul doar participă.",
    footer:"powered by Ragnar Czr ⚡"
  },
  strugurel:{
    background:"linear-gradient(rgba(20,0,35,.45),rgba(0,0,0,.80)), url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600&auto=format&fit=crop')",
    banner:"https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1600&auto=format&fit=crop",
    avatar:"https://i.imgur.com/8Km9tLL.png",
    title:"STRUGUREL",
    subtitle:"TikTok • Mafia Style",
    description:"Taptap și energie de boss 🍇",
    footer:"powered by Strugurel 🍇"
  }
};

function loadTheme(name){
  const t = themes[name];
  document.getElementById("choiceScreen").style.display="none";

  const site = document.getElementById("site");
  site.style.display="block";
  site.style.backgroundImage=t.background;

  document.getElementById("bannerImg").src=t.banner;
  document.getElementById("avatarImg").src=t.avatar;
  document.getElementById("cardTitle").innerText=t.title;
  document.getElementById("subtitle").innerText=t.subtitle;
  document.getElementById("description").innerText=t.description;
  document.getElementById("footer").innerText=t.footer;
}

function backToChoice(){
  document.getElementById("site").style.display="none";
  document.getElementById("choiceScreen").style.display="flex";
}
</script>

</body>
</html>
