<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ragnar Czr / Strugurel</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,Helvetica,sans-serif;
    }

    body{
      background:#050505;
      overflow-x:hidden;
      color:white;
    }

    .choice-screen{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:30px;
      padding:30px;
      background:linear-gradient(135deg,#050505,#1b0030);
    }

    .choice{
      width:420px;
      height:560px;
      border-radius:30px;
      overflow:hidden;
      cursor:pointer;
      position:relative;
      transition:.3s;
      border:2px solid rgba(255,255,255,.15);
      box-shadow:0 0 35px rgba(168,85,247,.35);
    }

    .choice:hover{
      transform:scale(1.03);
      box-shadow:0 0 60px rgba(168,85,247,.8);
    }

    .choice img{
      width:100%;
      height:100%;
      object-fit:cover;
      filter:brightness(.65);
    }

    .choice-text{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:end;
      align-items:center;
      text-align:center;
      padding:40px;
      background:linear-gradient(transparent,rgba(0,0,0,.92));
    }

    .choice-text h1{
      font-size:42px;
      text-transform:uppercase;
      text-shadow:0 0 20px #a855f7;
    }

    .choice-text p{
      margin-top:10px;
      color:#ddd;
      font-size:18px;
    }

    .site{
      display:none;
      min-height:100vh;
      padding:20px;
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      position:relative;
    }

    .overlay{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      backdrop-filter:brightness(.55);
    }

    .banner{
      width:100%;
      max-width:1450px;
      height:280px;
      border-radius:35px;
      overflow:hidden;
      margin-bottom:-70px;
      border:2px solid rgba(168,85,247,.45);
      box-shadow:0 0 40px rgba(168,85,247,.7);
      position:relative;
    }

    .banner img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .banner-text{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      background:rgba(0,0,0,.35);
    }

    .banner-text h1{
      font-size:70px;
      letter-spacing:4px;
      text-transform:uppercase;
      text-shadow:0 0 25px var(--main);
    }

    .banner-text p{
      margin-top:12px;
      font-size:22px;
      color:#eee;
      letter-spacing:2px;
    }

    .card{
      width:100%;
      max-width:430px;
      margin-top:90px;
      padding:35px;
      border-radius:30px;
      text-align:center;
      background:rgba(5,5,10,.82);
      backdrop-filter:blur(8px);
      border:1px solid rgba(168,85,247,.35);
      box-shadow:0 0 35px rgba(168,85,247,.55);
      position:relative;
    }

    .avatar{
      width:120px;
      height:120px;
      border-radius:50%;
      overflow:hidden;
      margin:-90px auto 20px;
      border:4px solid var(--main);
      box-shadow:0 0 25px var(--main);
      background:#111;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .card h2{
      font-size:50px;
      margin-bottom:10px;
      text-transform:uppercase;
    }

    .card p{
      color:#ddd;
      margin-bottom:25px;
      font-size:20px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      padding:18px;
      margin:14px 0;
      border-radius:18px;
      text-decoration:none;
      color:white;
      font-size:22px;
      font-weight:bold;
      background:linear-gradient(135deg,var(--main),var(--second));
      box-shadow:0 0 25px rgba(168,85,247,.55);
      transition:.25s;
    }

    .btn:hover{
      transform:scale(1.03);
      box-shadow:0 0 40px rgba(168,85,247,.9);
    }

    .switch{
      margin-top:18px;
      background:transparent;
      border:1px solid rgba(255,255,255,.25);
      color:white;
      padding:12px 18px;
      border-radius:14px;
      cursor:pointer;
      transition:.2s;
    }

    .switch:hover{
      background:rgba(255,255,255,.08);
    }

    .footer{
      margin-top:22px;
      color:#bbb;
      font-size:14px;
    }

    @media(max-width:900px){

      .choice-screen{
        flex-direction:column;
      }

      .choice{
        width:100%;
        max-width:360px;
        height:300px;
      }

      .banner{
        height:170px;
        border-radius:25px;
      }

      .banner-text h1{
        font-size:34px;
      }

      .banner-text p{
        font-size:14px;
      }

      .card{
        margin-top:70px;
        padding:25px;
      }

      .avatar{
        width:100px;
        height:100px;
        margin-top:-70px;
      }

      .card h2{
        font-size:34px;
      }

      .card p{
        font-size:16px;
      }

      .btn{
        font-size:18px;
        padding:15px;
      }
    }
  </style>
</head>

<body>

  <section class="choice-screen" id="choiceScreen">

    <div class="choice" onclick="loadTheme('ragnar')">
      <img src="ragnar-banner.png">

      <div class="choice-text">
        <h1>Ragnar</h1>
        <p>Syndicate • B-Zone</p>
      </div>
    </div>

    <div class="choice" onclick="loadTheme('strugurel')">
      <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop">

      <div class="choice-text">
        <h1>Strugurel</h1>
        <p>TikTok • Mafia Style</p>
      </div>
    </div>

  </section>

  <main class="site" id="site">

    <div class="overlay">

      <section class="banner">

        <img id="bannerImg">

        <div class="banner-text">
          <h1 id="title"></h1>
          <p id="subtitle"></p>
        </div>

      </section>

      <section class="card">

        <div class="avatar">
          <img id="avatarImg">
        </div>

        <h2 id="cardTitle"></h2>

        <p id="description"></p>

        <a class="btn" href="#" target="_blank">
          Discord
        </a>

        <a class="btn" href="#" target="_blank">
          TikTok
        </a>

        <a class="btn" href="#" target="_blank">
          YouTube
        </a>

        <a class="btn" href="#" target="_blank">
          Donații
        </a>

        <button class="switch" onclick="backToChoice()">
          Schimbă tema
        </button>

        <div class="footer" id="footer"></div>

      </section>

    </div>

  </main>

  <script>

    const themes = {

      ragnar: {

        main:"#8b2cff",
        second:"#ff00b7",

        background:"linear-gradient(rgba(0,0,0,.30),rgba(0,0,0,.75)), url('ragnar-bg.png')",

        banner:"ragnar-banner.png",

        avatar:"ragnar-banner.png",

        title:"RAGNAR",

        subtitle:"Syndicate • B-Zone • Los Santos",

        description:"Sindicatul conduce jocul. Restul doar participă.",

        footer:"powered by Ragnar Czr ⚡"

      },

      strugurel: {

        main:"#8b00ff",
        second:"#c026d3",

        background:"linear-gradient(rgba(20,0,35,.45),rgba(0,0,0,.80)), url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600&auto=format&fit=crop')",

        banner:"https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1600&auto=format&fit=crop",

        avatar:"https://i.imgur.com/8Km9tLL.png",

        title:"STRUGUREL",

        subtitle:"TikTok • Mafia Style",

        description:"Taptap și energie de boss 🍇",

        footer:"powered by Strugurel 🍇"

      }

    };

    function loadTheme(name){

      const t = themes[name];

      document.body.style.setProperty('--main', t.main);
      document.body.style.setProperty('--second', t.second);

      document.getElementById('choiceScreen').style.display='none';

      const site=document.getElementById('site');

      site.style.display='block';

      site.style.backgroundImage=t.background;

      document.getElementById('bannerImg').src=t.banner;

      document.getElementById('avatarImg').src=t.banner;

      document.getElementById('title').innerText=t.title;

      document.getElementById('subtitle').innerText=t.subtitle;

      document.getElementById('cardTitle').innerText=t.title;

      document.getElementById('description').innerText=t.description;

      document.getElementById('footer').innerText=t.footer;

    }

    function backToChoice(){

      document.getElementById('site').style.display='none';

      document.getElementById('choiceScreen').style.display='flex';

    }

  </script>

</body>
</html>
