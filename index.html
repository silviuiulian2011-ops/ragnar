<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ragnar Czr</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,Helvetica,sans-serif;
}

body{
  min-height:100vh;

  background:
  linear-gradient(rgba(0,0,0,.10),rgba(0,0,0,.45)),
  url("main-bg.png?v=2");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  color:white;

  overflow-x:hidden;
}

.page{
  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  padding:30px 16px;
}

/* CARD */

.card{

  width:100%;
  max-width:430px;

  padding:38px 32px 28px;

  border-radius:32px;

  text-align:center;

  background:rgba(0,0,0,.12);

  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
  0 0 35px rgba(168,85,247,.28);

}

/* LOGO */

.logo{

  width:105px;
  height:105px;

  margin:0 auto 20px;

  border-radius:50%;

  overflow:hidden;

  border:4px solid #8b2cff;

  box-shadow:
  0 0 35px rgba(168,85,247,1);

  background:#111;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */

h1{
  font-size:42px;
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:10px;

  text-shadow:
  0 0 18px rgba(168,85,247,.75);
}

.subtitle{
  color:#c084fc;
  font-size:18px;
  margin-bottom:14px;
}

.desc{
  color:#f1f1f1;
  font-size:17px;
  margin-bottom:26px;
}

/* BUTTONS */

.btn{

  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;

  width:100%;

  padding:17px;

  margin:14px 0;

  border-radius:18px;

  text-decoration:none;

  color:white;

  font-size:20px;

  font-weight:bold;

  background:
  rgba(255,255,255,.08);

  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);

  border:1px solid rgba(255,255,255,.10);

  box-shadow:
  0 0 18px rgba(168,85,247,.18);

  transition:.25s;
}

.btn:hover{

  transform:scale(1.03);

  background:
  rgba(255,255,255,.14);

  box-shadow:
  0 0 28px rgba(168,85,247,.45);
}

.footer{
  margin-top:22px;
  color:#ddd;
  font-size:14px;
}

/* MOBILE */

@media(max-width:900px){

  body{
    background-position:center top;
    background-attachment:scroll;
  }

  .page{
    align-items:flex-end;
    padding:24px 14px;
  }

  .card{
    max-width:360px;
    padding:28px 22px;
  }

  .logo{
    width:90px;
    height:90px;
  }

  h1{
    font-size:32px;
  }

  .subtitle{
    font-size:14px;
  }

  .desc{
    font-size:15px;
  }

  .btn{
    font-size:17px;
    padding:15px;
  }

}

</style>
</head>

<body>

<main class="page">

  <section class="card">

    <div class="logo">
      <img src="main-bg.png?v=2" alt="Ragnar Czr">
    </div>

    <h1>RAGNAR</h1>

    <div class="subtitle">
      Syndicate • B-Zone • Los Santos
    </div>

    <div class="desc">
      Sindicatul conduce jocul. Restul doar participă.
    </div>

    <a class="btn" href="#" target="_blank">
      🎮 Discord
    </a>

    <a class="btn" href="#" target="_blank">
      🎵 TikTok
    </a>

    <a class="btn" href="#" target="_blank">
      ▶️ YouTube
    </a>

    <a class="btn" href="#" target="_blank">
      ❤️ Donații
    </a>

    <div class="footer">
      powered by Ragnar Czr ⚡
    </div>

  </section>

</main>

</body>
</html>
