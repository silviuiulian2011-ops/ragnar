<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ragnar Czr</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html,body{
    width:100%;
    min-height:100%;
    overflow-x:hidden;
    background:#050505;
}

body{

    background:
    linear-gradient(rgba(0,0,0,.10),rgba(0,0,0,.38)),
    url("main-bg-pc.png");

    background-size:contain;
    background-position:center center;
    background-repeat:no-repeat;
    background-color:#050505;

    color:white;
}

/* MAIN */

.main{

    width:100%;
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:30px 15px;
}

/* CARD */

.card{

    width:100%;
    max-width:430px;

    padding:35px 30px;

    border-radius:35px;

    background:rgba(0,0,0,.25);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
    0 0 35px rgba(168,85,247,.22);

    text-align:center;
}

/* LOGO */

.logo{

    width:105px;
    height:105px;

    margin:0 auto 22px;

    border-radius:50%;

    overflow:hidden;

    border:4px solid #8b2cff;

    box-shadow:
    0 0 30px rgba(168,85,247,.85);
}

.logo img{

    width:100%;
    height:100%;
    object-fit:cover;
}

/* TITLES */

h1{

    font-size:52px;

    letter-spacing:4px;

    margin-bottom:10px;

    text-shadow:
    0 0 20px rgba(168,85,247,.8);
}

.subtitle{

    color:#c084fc;

    font-size:20px;

    margin-bottom:20px;
}

.desc{

    font-size:19px;

    line-height:1.5;

    color:#f1f1f1;

    margin-bottom:30px;
}

/* BUTTONS */

.btn{

    width:100%;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:10px;

    margin:14px 0;

    padding:18px;

    border-radius:18px;

    text-decoration:none;

    font-size:22px;

    font-weight:bold;

    color:white;

    background:rgba(255,255,255,.06);

    border:1px solid rgba(255,255,255,.10);

    transition:.25s;
}
    .btn img{

    width:26px;
    height:26px;

    object-fit:contain;
}

.btn:hover{

    transform:scale(1.03);

    background:rgba(168,85,247,.20);

    box-shadow:
    0 0 25px rgba(168,85,247,.4);
}

/* FOOTER */

.footer a{

    color:#c084fc;

    text-decoration:none;

    font-weight:bold;

    transition:.25s;
}

.footer a:hover{

    color:white;

    text-shadow:
    0 0 10px #c084fc;
}
/* MOBILE */

@media(max-width:900px){

    body{

        background:
        linear-gradient(rgba(0,0,0,.10),rgba(0,0,0,.45)),
        url("main-bg-mobile.png");

        background-size:cover;
        background-position:center center;
        background-repeat:no-repeat;
        background-color:#050505;
    }

    html,body{
        background-color:#050505;
    }

    .main{

        min-height:100vh;

        align-items:center;
        justify-content:center;

        padding:20px 15px;
    }

    .card{

        max-width:360px;

        padding:25px 22px;

        background:rgba(0,0,0,.25);
    }

    .logo{

        width:85px;
        height:85px;
    }

    h1{

        font-size:36px;
    }

    .subtitle{

        font-size:16px;
    }

    .desc{

        font-size:16px;
    }

    .btn{

        font-size:18px;

        padding:15px;
    }
}

</style>
</head>
